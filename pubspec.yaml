name: safehire_c
description: "Safe Hire App"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  shared_preferences: ^2.2.2
  lottie: ^3.1.0
  fl_chart: ^0.68.0
  http: ^1.2.0
  permission_handler: ^11.0.1
  file_picker: ^8.0.0
  tflite_flutter: ^0.10.4
  archive: ^3.4.10
  crypto: ^3.0.3
  url_launcher: ^6.2.5
  image_picker: ^1.0.7
  supabase_flutter: ^2.3.4
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/lottie/security.json
    - assets/model/fake_news.tflite

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/logo.png"

flutter_native_splash:
  color: "#141E30"
  image: assets/icon/logo.png
  android: true